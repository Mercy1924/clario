# A string used to distinguish different Supabase projects on the same host.
# Defaults to the working directory name when running `supabase init`.
project_id = "clarios"

[api]
enabled = true
# Port to use for the API URL.
port = 54321
# Schemas to expose in your API. Tables, views and stored procedures in this schema will get API
# endpoints. `public` is always included.
schemas = ["public", "graphql_public"]
# Extra schemas to add to the search_path of every request. `public` is always included.
extra_search_path = ["public", "extensions"]
# The maximum number of rows returns from a view, table, or stored procedure. Limits payload size
# for accidental or malicious requests.
max_rows = 1000

[api.tls]
enabled = false

[db]
# Port to use for the local database URL.
port = 54322
# Port used by db diff command to initialize the shadow database.
shadow_port = 54320
# The database major version to use.
major_version = 15

[db.pooler]
enabled = false
# Port to use for the local connection pooler.
port = 54329
# Specifies when a server connection can be reused by other clients.
# Configure one of the supported pooler modes: `transaction`, `session`.
pool_mode = "transaction"
# How many server connections to allow per user/database pair.
default_pool_size = 20
# Maximum client connections allowed.
max_client_conn = 100

[realtime]
enabled = true
# Bind bandwidth via R2 buckets.
ip_version = "IPv4"
# Turn on realtime monitoring metrics
enable_metrics = false

[studio]
enabled = true
# Port to use for Supabase Studio.
port = 54323
# External URL of the API server that frontend connects to.
api_url = "http://127.0.0.1"
# OpenAI API Key to use for Supabase AI in the Supabase Studio.
openai_api_key = "env(OPENAI_API_KEY)"

# Email testing server. Emails sent by Supabase is logged here.
[inbucket]
enabled = true
# Port to use for the email testing server web interface.
port = 54324
# Uncomment to expose additional ports for testing user applications that send emails.
# smtp_port = 54325
# pop3_port = 54326

[storage]
enabled = true
# The maximum file size allowed (e.g. "5MB", "500KB").
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
# The base URL of your website. Used as an allow-list for redirects and for constructing URLs used
# in emails.
site_url = "http://127.0.0.1:3000"
# A list of *exact* URLs that auth providers are permitted to redirect to post authentication.
additional_redirect_urls = ["https://127.0.0.1:3000"]
# How long tokens are valid for, in seconds. Defaults to 3600 (1 hour), maximum 604,800 (1 week).
jwt_expiry = 3600
# If disabled, the refresh token will never expire.
enable_refresh_token_rotation = true
# Allows refresh tokens to be reused after expiry, up to the specified interval in seconds.
# Requires enable_refresh_token_rotation = true.
refresh_token_reuse_interval = 10
# Allow/disallow new user signups to your project.
enable_signup = true
# Allow/disallow anonymous signups to your project.
enable_anonymous_signups = false
# Automatically send confirmation emails for signups, and toggle secured email login for your project.
enable_email_confirmations = false
# Automatically send password recovery emails to for password reset requests.
enable_recovery_email = true
# Allow/disallow users to apply for email change
enable_email_change = true

[auth.rate_limit]
# Number of emails that can be sent per hour. Requires an enabled Email Provider.
email_sent = 2
# Number of SMS that can be sent per hour. Requires an enabled Phone Provider.
sms_sent = 3
# Number of token verifications, password resets, and code exchanges per hour.
token_verification = 3
# Number of anonymous sign ins that can be done per hour.
anonymous_users = 3
# Number of users that can be created per hour.
users = 3

# Allow/disallow signup via email.
[auth.email]
enable_signup = true
# Enable double opt-in. Requires an enabled Email Provider.
double_confirm_changes = true
# Enable email signing up.
enable_signups = true

# Auth Provider - Email
[auth.email.smtp]
enabled = false
# The host of the SMTP server used for sending emails.
host = "env(MAILER_HOST)"
# The port that the SMTP server uses for sending emails.
port = 587
# The username or API key of the SMTP server used for sending emails.
user = "mailer"
# The password or API key of the SMTP server used for sending emails.
pass = "mailerpass"
# The email address used as the sender address.
sender_email = "noreply@email.com"
# The name used as the sender name.
sender_name = "Clarios"

# Auth Provider - Phone
[auth.sms]
enable_signup = false
# Allow/disallow phone number changes.
enable_phone_change = false
# Twilio Mode: `message`.
provider = "twilio"

[auth.sms.twilio]
enabled = false
account_sid = "env(TWILIO_ACCOUNT_SID)"
message_service_sid = "env(TWILIO_MESSAGE_SERVICE_SID)"
auth_token = "env(TWILIO_AUTH_TOKEN)"

[auth.hook]
# URI of the External HTTP Hook.
custom_access_token_hook = { enabled = false, uri = "pg-functions://postgres/public/custom_access_token_hook" }

[auth.hook.mfa_info_verify]
# URI of the External HTTP Hook.
enabled = false
uri = "pg-functions://postgres/public/mfa_info_verify"

[auth.hook.send_sms]
# URI of the External HTTP Hook.
enabled = false
uri = "pg-functions://postgres/public/send_sms"

[auth.mfa]
# Control how many MFA factors can be enrolled at once.
max_enrolled_factors = 10

# Control the number of TOTP factors that can be enrolled.
[auth.mfa.totp]
enroll_enabled = true

# Control the number of Phone factors that can be enrolled.
[auth.mfa.phone]
enroll_enabled = false
# Control the max number of OTP codes that can be verified in total.
max_verification_attempts = 3
# Control the max number of OTP codes that can be sent to a user in total.
max_unverified_challenges = 3

[auth.mfa.web_authn]
enroll_enabled = false

[auth.external.apple]
enabled = false
client_id = "env(APPLE_CLIENT_ID)"
# Use the `auth.jwt.secret` if this value is not provided.
secret = "env(APPLE_SECRET)"
# `enabled` should be set to true if using the regular Client ID.
# `enabled` should be set to true if using the Services ID.
# See: https://supabase.com/docs/guides/auth/social-login/auth-apple
enabled = false
# URL for the redirect URI.
redirect_uri = "https://<project-ref>.supabase.co/auth/v1/callback"
# Additional scopes that are required for the Apple Sign-In.
additional_scopes = ["name", "email"]

[auth.external.google]
enabled = false
client_id = "env(GOOGLE_CLIENT_ID)"
# Use the `auth.jwt.secret` if this value is not provided.
secret = "env(GOOGLE_SECRET)"
# URL for the redirect URI.
redirect_uri = "https://<project-ref>.supabase.co/auth/v1/callback"
# Additional scopes that are required for the Google Sign-In.
additional_scopes = ["email", "profile"]

[analytics]
enabled = true
port = 54327
# Configure one of the supported backends: `postgres`, `vector`.
backend = "postgres"

# Features
[features]
# Display the current Supabase version.
display_version = true
